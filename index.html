<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#090807" />
  <title>Orm TextTool</title>
  <link rel="stylesheet" href="./styles.css?v=20260312-02" />
</head>
<body>
  <div class="app-shell">
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>

    <main class="mobile-app">
      <header class="hero-card glass-card">
        <div class="hero-topline">
          <div class="title-lockup">
            <h1>Text Library</h1>
            <span class="brand-pill">Orm TextTool</span>
          </div>
        </div>
        <div class="stats-row">
          <article>
            <span id="activeCount">0</span>
            <label>未使用</label>
          </article>
          <article>
            <span id="historyCount">0</span>
            <label>已使用</label>
          </article>
          <article>
            <span id="categoryCount">0</span>
            <label>目录</label>
          </article>
        </div>
      </header>

      <section class="glass-card control-card">
        <div class="section-heading">
          <h2>目录</h2>
          <button id="showAllBtn" class="ghost-button compact-button is-active" type="button">全部</button>
        </div>

        <div class="action-grid category-grid">
          <input id="newCategoryInput" type="text" maxlength="24" placeholder="新建目录" />
          <button id="createCategoryBtn" class="primary-button" type="button">添加</button>
        </div>

        <div id="categoryList" class="category-strip"></div>
      </section>

      <section class="glass-card control-card">
        <div class="section-heading">
          <h2>导入</h2>
        </div>

        <input id="fileInput" class="visually-hidden" type="file" accept=".xlsx,.xls,.csv" />

        <div class="import-grid">
          <select id="importCategorySelect"></select>
          <button id="importTriggerBtn" class="primary-button file-trigger-button" type="button">选择文件 · Excel/CSV</button>
        </div>

        <label class="toggle-row">
          <input id="skipHeaderCheckbox" type="checkbox" />
          <span>跳过首行表头</span>
        </label>

        <p id="importFeedback" class="import-feedback"></p>
      </section>

      <section class="glass-card browser-card">
        <div class="section-heading">
          <h2 id="listTitle">当前条目</h2>
        </div>

        <div class="segmented-control">
          <button class="segment is-active" data-view="active" type="button">当前</button>
          <button class="segment" data-view="history" type="button">历史</button>
        </div>

        <div class="filter-grid">
          <input id="searchInput" type="search" placeholder="搜索文本或文件名" />
          <select id="sortSelect">
            <option value="sheet">表格顺序</option>
            <option value="newest">最近导入</option>
            <option value="oldest">最早导入</option>
          </select>
        </div>

        <div class="list-header" aria-hidden="true">
          <span>目录 / 内容</span>
          <span>行号</span>
          <span>操作</span>
        </div>

        <div id="entryList" class="entry-list"></div>

        <div id="emptyState" class="empty-state hidden">
          <h3>暂无内容</h3>
          <p>导入 Excel 后会在这里展示。</p>
        </div>

        <div class="pagination-bar">
          <button id="prevPageBtn" class="ghost-button compact-button" type="button">上一页</button>
          <span id="pageMeta" class="page-meta">第 1 页</span>
          <button id="nextPageBtn" class="ghost-button compact-button" type="button">下一页</button>
        </div>
      </section>
    </main>
  </div>

  <template id="entryCardTemplate">
    <article class="entry-row" tabindex="0">
      <div class="entry-row__main">
        <span class="category-badge"></span>
        <p class="entry-row__text"></p>
      </div>
      <span class="entry-row__source"></span>
      <div class="entry-row__actions">
        <button class="mini-button copy-button" type="button">复制</button>
        <button class="mini-button restore-button hidden" type="button">恢复</button>
        <button class="icon-button delete-button" type="button" aria-label="删除条目">×</button>
      </div>
    </article>
  </template>

  <template id="categoryItemTemplate">
    <article class="category-item">
      <button class="category-item__select" type="button">
        <span class="category-item__swatch"></span>
        <span class="category-item__name"></span>
        <span class="category-item__count"></span>
      </button>
      <button class="icon-button category-item__delete" type="button" aria-label="删除目录">×</button>
    </article>
  </template>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="./app.js?v=20260312-02"></script>
</body>
</html>
